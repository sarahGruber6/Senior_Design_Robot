<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Robot Job Publisher</title>

<style>
body{
  font-family: system-ui, Arial;
  margin: 30px auto;
  max-width: 900px;
  background:#f4f6f8;
}

h2{ margin-bottom:20px; }

.card{
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.06);
  margin-bottom:20px;
}

.section-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

label{
  display:block;
  margin-top:12px;
  font-weight:600;
}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
  margin-top:12px;
}

.primary{ background:#1976d2; color:white; }
.secondary{ background:#e3e8ef; }
.warning{ background:#ff9800; color:white; }
.danger{ background:#e53935; color:white; }

.actions button{ margin-right:10px; }

.hint{
  color:#666;
  font-size:13px;
  margin-top:6px;
}
</style>
</head>

<body>

<h2>Robot Job Publisher — Robot {{ robot_id }}</h2>

<!-- JOB FORM -->
<div class="card">
<div class="section-title">Queue New Job</div>

<form method="post" action="/submit">

<label>Job ID</label>
<input name="job_id" value=""/>
<div class="hint">Example: J001</div>

<label>Destination</label>
<input name="destination" value=""/>
<div class="hint">Example: Bin_A3</div>

<label>Items (Part,Qty per line)</label>
<textarea name="items" rows="5"></textarea>
<div class="hint">Example: 10k resistor,50</div>

<label>Note (optional)</label>
<input name="note"/>

<label>Created By</label>
<input name="created_by" value=""/>
<div class="hint">Example: labtech_sarah</div>

<button class="primary" type="submit">Queue Job</button>

</form>
</div>

<!-- QUEUE / ROBOT ACTIONS -->
<div class="card">
<div class="section-title">Robot Actions</div>


<a class="btn secondary" href="/queue">
  <button class="warning">View Job Queue</button>
</a>

<form method="post" action="/api/robot/claim_next">
<button class="warning">Claim Next Job</button>
</form>
</div>

<!-- ADMIN -->
<div class="card">
<div class="section-title">Admin</div>

<a class="btn secondary" href="/admin">
  <button class="danger">Admin Page</button>
</a>

<p class="hint">
MQTT topic: <code>{{ topic_job }}</code>
</p>

</body>
</html>
