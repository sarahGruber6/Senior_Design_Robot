<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Robot Job Publisher</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <!-- dark mode toggle -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem("theme");
        if (saved) document.documentElement.dataset.theme = saved;
      } catch (e) {}
    })();
  </script>

</head>

<body>
  <div class="topbar">
    <h2 class="title">Robot Job Publisher</h2>
    <button id="themeToggle" class="theme-toggle" type="button">🌙 Dark</button>
  </div>

  <div class="wrap">
    <div class="top">
      <h2 class="title">Robot {{ robot_id }}</h2>
      <div class="actions">
        <a class="btn secondary" href="/queue">View Queue</a>
        <a class="btn secondary" href="/api/jobs">View JSON</a>
        <a class="btn" href="/admin">Admin</a>
      </div>
    </div>

    <!-- JOB FORM -->
    <div class="card">
      <div class="section-title">Queue New Job</div>

      <form id="queueForm" onsubmit="return false;">

        <label>Job ID <span class="req">*</span></label>
        <input name="job_id" value="{{ next_job_id or 'J001'}}" readonly />

        <label>Destination <span class="req">*</span></label>
        <select name="destination" required>
          <option value="" selected disabled>Select a destination…</option>
          <option value="dock">dock</option>
          <option value="table">table</option>
        </select>

        <label>Items <span class="req">*</span></label>
        <div class="items" id="itemsWrap"></div>

        <div class="actions" style="margin-top:10px;">
          <button class="secondary" type="button" onclick="addItemRow()">+ Add item</button>
        </div>

        <!-- Note -->
        <label>Note (optional)</label>
        <input name="note" placeholder="Anything helpful for the runner…"/>

        <!-- Created By -->
        <label>Created By <span class="req">*</span></label>
        <input name="created_by" value="" placeholder="labtech_sarah" required />

        <div class="actions">
          <button class="primary" type="button" onclick="queueJob()">Queue Job</button>
          <button class="secondary" type="reset" onclick="resetItemsUI()">Clear</button>
        </div>

        <p class="hint" style="margin-top:12px;">
          MQTT topic: <code>{{ topic_job }}</code>
        </p>

      </form>
    </div>

    <!-- QUEUE / ROBOT ACTIONS -->
    <div class="card">
    <div class="section-title">Robot Actions</div>

    <div class="hint" style="margin-bottom:8px;">
      Use these to test the robot publishing/subscribing flow.
    </div>

    <div class="actions">
      <button class="warning" type="button" onclick="apiPost('/api/robot/claim_next')">
        Claim Next Job
      </button>
      <button class="warning" type="button" onclick="apiPost('/api/robot/finish_active')">
        Finish Active Job
      </button>
    </div>
    <!-- for button json responses -->
    <div id="apiModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="apiModalTitle">
      <div class="modal-card">
        <div class="modal-header">
          <div>
            <div id="apiModalTitle" class="modal-title">API Response</div>
            <div id="apiModalSubtitle" class="modal-subtitle muted"></div>
          </div>
          <button type="button" class="modal-close" onclick="closeApiModal()">✕</button>
        </div>
        <pre id="apiModalBody" class="modal-pre">{}</pre>
        <div class="modal-actions">
          <button type="button" class="secondary" onclick="copyApiModal()">Copy JSON</button>
          <button type="button" class="primary" onclick="closeApiModal()">Close</button>
        </div>
      </div>
    </div>
  </div>
</body>

<!-- dark mode toggling/saving -->
<script>
  (function () {
    const root = document.documentElement;
    const btn = document.getElementById("themeToggle");
    if (!btn) return;

    function setTheme(t) {
      root.dataset.theme = t;
      try { localStorage.setItem("theme", t); } catch(e) {}
      btn.textContent = (t === "dark") ? "☀️ Light" : "🌙 Dark";
      btn.setAttribute("aria-pressed", t === "dark");
    }

    const current = root.dataset.theme || "light";
    setTheme(current);

    btn.addEventListener("click", () => {
      setTheme(root.dataset.theme === "dark" ? "light" : "dark");
    });
  })();
</script>

<!-- api button script -->
<script>
  async function apiPost(url, opts = {}) {
    const subtitle = `${opts.method || "POST"} ${url}`;
    openApiModal("Working…", subtitle, "{\n  \"ok\": false,\n  \"loading\": true\n}");

    try {
      if(opts.body){
        opts.headers = {"Content-Type": "application/json"};
      }
      const res = await fetch(url, {
        method: opts.method || "POST",
        headers: opts.body ? { "Content-Type": "application/json" } : undefined,
        body: opts.body ? JSON.stringify(opts.body) : undefined
      });

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { data = { raw: text }; }

      const title = res.ok ? "Success" : `Error (${res.status})`;
      openApiModal(title, subtitle, JSON.stringify(data, null, 2));
      return { ok: res.ok, status: res.status, data };
    } catch (err) {
      openApiModal("Network error", subtitle, JSON.stringify({ error: String(err) }, null, 2));
      return { ok: false, status: 0, data: { error: String(err) } };
    }
  }
  async function apiGet(url) {
    const subtitle = `GET ${url}`;
    openApiModal("Working…", subtitle, "{\n  \"ok\": false,\n  \"loading\": true\n}");

    try {
      const res = await fetch(url, { method: "GET" });

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { data = { raw: text }; }

      const title = res.ok ? "Success" : `Error (${res.status})`;
      openApiModal(title, subtitle, JSON.stringify(data, null, 2));
      return { ok: res.ok, status: res.status, data };
    } catch (err) {
      openApiModal("Network error", subtitle, JSON.stringify({ error: String(err) }, null, 2));
      return { ok: false, status: 0, data: { error: String(err) } };
    }
  }
  /* -- queue job button script -- */
  const itemsWrap = document.getElementById("itemsWrap");

  function addItemRow(partVal = "", qtyVal = 1) {
    const row = document.createElement("div");
    row.className = "item-row";

    row.innerHTML = `
      <input type="text" name="item_part" placeholder="Item (e.g., 10k resistor)" value="${escapeHtml(partVal)}" required>
      <input type="number" name="item_qty" min="1" step="1" value="${qtyVal}" required>
      <button type="button" class="mini" aria-label="Remove item">✕</button>
    `;

    row.querySelector("button").addEventListener("click", () => {
      row.remove();
    });

    itemsWrap.appendChild(row);
  }

  function resetItemsUI() {
    // Clear and restore one default rows
    itemsWrap.innerHTML = "";
    addItemRow("", 1);
  }

  // small helper so quotes don’t break HTML
  function escapeHtml(s) {
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  async function queueJob() {
    const form = document.getElementById("queueForm");
    const fd = new FormData(form);

    const job_id = (fd.get("job_id") || "").trim();
    const destination = (fd.get("destination") || "").trim();
    const note = (fd.get("note") || "").trim();
    const created_by = (fd.get("created_by") || "").trim();

    // Gather items from dynamic rows
    const parts = form.querySelectorAll('input[name="item_part"]');
    const qtys  = form.querySelectorAll('input[name="item_qty"]');

    const items = [];
    for (let i = 0; i < parts.length; i++) {
      const part = (parts[i].value || "").trim();
      const qty = parseInt(qtys[i].value || "0", 10);

      if (!part) continue;
      if (!Number.isFinite(qty) || qty <= 0) {
        openApiModal("Error", "Queue Job", JSON.stringify({ ok:false, error:`Bad qty for item "${part}"` }, null, 2));
        return;
      }
      items.push({ part, qty });
    }

    // Required checks
    if (!job_id) {
      openApiModal("Error", "Queue Job", JSON.stringify({ ok:false, error:"Missing Job ID" }, null, 2));
      return;
    }
    if (!destination) {
      openApiModal("Error", "Queue Job", JSON.stringify({ ok:false, error:"Destination is required" }, null, 2));
      return;
    }
    if (items.length === 0) {
      openApiModal("Error", "Queue Job", JSON.stringify({ ok:false, error:"At least one item is required" }, null, 2));
      return;
    }
    if (!created_by) {
      openApiModal("Error", "Queue Job", JSON.stringify({ ok:false, error:"Created By is required" }, null, 2));
      return;
    }

    const payload = { job_id, destination, items, note, created_by };

    const btn = form.querySelector("button.primary");
    const old = btn ? btn.textContent : "";
    if (btn) { btn.disabled = true; btn.textContent = "Queueing…"; }

    const res = await apiPost("/api/jobs", { method: "POST", body: payload });

    if (btn) { btn.disabled = false; btn.textContent = old || "Queue Job"; }

    if (res.ok) {
      form.reset();
      // Reset items rows + also refresh the auto job id if you want (see note below)
      resetItemsUI();
      // Optional: bump job ID on success
      bumpJobIdField();
    }
  }

  function bumpJobIdField() {
    const jobField = document.querySelector('input[name="job_id"]');
    if (!jobField) return;

    // J### -> increment
    const m = /^J(\d+)$/.exec(jobField.value.trim().toUpperCase());
    if (!m) return;
    const n = parseInt(m[1], 10);
    if (!Number.isFinite(n)) return;
    jobField.value = "J" + String(n + 1).padStart(3, "0");
  }

  // Initialize two default item rows on page load
  document.addEventListener("DOMContentLoaded", () => {
    resetItemsUI();
  });

  function openApiModal(title, subtitle, body) {
    document.getElementById("apiModalTitle").textContent = title;
    document.getElementById("apiModalSubtitle").textContent = subtitle || "";
    document.getElementById("apiModalBody").textContent = body || "{}";
    document.getElementById("apiModal").classList.remove("hidden");
  }

  function closeApiModal() {
    document.getElementById("apiModal").classList.add("hidden");
  }

  async function copyApiModal() {
    const txt = document.getElementById("apiModalBody").textContent;
    try { await navigator.clipboard.writeText(txt); } catch(e) {}
  }

  // close modal on background 
  document.addEventListener("click", (e) => {
    const modal = document.getElementById("apiModal");
    if (!modal.classList.contains("hidden") && e.target === modal) closeApiModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeApiModal();
  });
</script>

</html>
